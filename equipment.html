<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment · Coffee Pantry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Coffee Pantry</a>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="equipment.html">Equipment</a>
      <a href="methods.html">Methods</a>
      <a href="beans.html">Beans</a>
      <a href="cafes.html">Cafes</a>
      <a href="social.html">Social</a>
      <a href="references.html">References</a>
    </nav>
  </header>

  <main>
    <h1>Equipment</h1>
    <p class="page-intro">The gear in the home setup.</p>
    <div class="card-grid" id="equipment-list"></div>
  </main>

  <footer class="site-footer">Coffee Pantry — a personal project, not hosted (yet).</footer>
  <script src="js/main.js"></script>
  <script>
    loadAndRender("data/equipment.json", "equipment-list", (item) => `
      <article class="card">
        ${item.image ? `<img src="${item.image}" alt="${item.name}">` : ""}
        <h3>${item.name}</h3>
        <p class="card-meta">${[item.type, item.brand].filter(Boolean).join(" · ")}</p>
        ${item.dateAcquired ? `<p class="card-meta">Acquired: ${item.dateAcquired}</p>` : ""}
        ${item.notes ? `<p>${item.notes}</p>` : ""}
      </article>
    `);
  </script>
</body>
</html>
