    <h1>Wishlist</h1>

    <div class="wishlist-grid" id="wishlist-list"></div>
  </main>

  <footer class="site-footer">Coffee Pantry (a personal project, not hosted, yet).</footer>
  <script src="js/main.js"></script>
  <script>
    loadAndRender("data/wishlist.json", "wishlist-list", (item) => {
      const label = [item.roaster, item.name].filter(Boolean).join(": ");
      const content = item.url
        ? `<a href="${item.url}" target="_blank" rel="noopener">${label}</a>`
        : label;
      return `<article class="card wishlist-card">${content}</article>`;
    });
  </script>
</body>
